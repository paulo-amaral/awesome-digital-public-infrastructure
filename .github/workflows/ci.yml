name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Mondays at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

# Minimal permissions — read-only by default, write only where needed
permissions:
  contents: read

jobs:
  linkcheck:
    name: Check links
    runs-on: ubuntu-latest
    # Scoped permissions for this job
    permissions:
      contents: read
      issues: write  # needed to open issues on broken links

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.3.0
        with:
          # Exclusions are read from .lycheeignore
          args: >
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --retry-wait-time 2
            --exclude-mail
            --exclude-loopback
            --accept 200,206,429
            README.MD
            CONTRIBUTING.md
            DEVELOPMENT.md
            docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd  # v5.0.1
        with:
          title: "Weekly check: broken links found"
          content-filepath: ./lychee/out.md
          labels: broken-link, maintenance
          assignees: paulo-amaral
