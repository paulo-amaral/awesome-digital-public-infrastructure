name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Mondays at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  linkcheck:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v1
        with:
          # Exclusions are read from .lycheeignore
          args: >
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --retry-wait-time 2
            --exclude-mail
            --exclude-loopback
            --accept 200,206,429
            README.MD
            CONTRIBUTING.md
            DEVELOPMENT.md
            docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Weekly check: broken links found"
          content-filepath: ./lychee/out.md
          labels: broken-link, maintenance
          assignees: paulo-amaral
